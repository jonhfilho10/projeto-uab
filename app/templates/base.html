<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Projeto Social{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand mb-0 h1">Sistema Projeto Social</span>
</nav>

<div class="d-flex">
    <aside class="sidebar bg-dark text-white p-3">
        <h5>Menu</h5>
        <small>Usuário: {{ session.get("usuario_nome") }}</small>
        <hr>
        <a href="/" class="menu-link">Dashboard</a>
        <a href="/alunos" class="menu-link">Participantes</a>
        <a href="/modalidades" class="menu-link">Modalidades</a>
        <a href="/usuarios" class="menu-link">Usuários</a>
        <a href="/relatorios" class="menu-link">Relatórios</a>
        <a href="/logout" class="menu-link">Sair</a>
    </aside>

    <main class="content p-4">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
