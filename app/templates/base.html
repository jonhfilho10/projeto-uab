<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Sistema de Gestão Esportiva{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<div class="app-layout">

    <aside class="sidebar">

        <div class="sidebar-brand">
            <div class="brand-logo">
                🏆
            </div>

            <div>
                <h5>Sistema de Gestão</h5>
                <small>Projeto Social Esportivo</small>
            </div>
        </div>

        <nav class="sidebar-menu">

            <a href="/" class="menu-link {% if request.path == '/' %}active{% endif %}">
                <span>📊</span>
                Dashboard
            </a>

            <a href="/alunos" class="menu-link {% if '/alunos' in request.path %}active{% endif %}">
                <span>👥</span>
                Participantes
            </a>

            <a href="/modalidades" class="menu-link {% if '/modalidades' in request.path %}active{% endif %}">
                <span>⚽</span>
                Modalidades
            </a>

            <a href="/usuarios" class="menu-link {% if '/usuarios' in request.path %}active{% endif %}">
                <span>👤</span>
                Usuários
            </a>

            <a href="/relatorios" class="menu-link {% if '/relatorios' in request.path %}active{% endif %}">
                <span>📄</span>
                Relatórios
            </a>

        </nav>

    </aside>

    <main class="main-area">

        <header class="topbar">

            <div>
                <button class="btn-menu" type="button">
                    ☰
                </button>
            </div>

            <div class="topbar-user">

                <div class="user-info">
                    <strong>{{ session.get("usuario_nome") }}</strong>
                    <small>{{ session.get("usuario_perfil") }}</small>
                </div>

                <div class="user-avatar">
                    {{ session.get("usuario_nome", "U")[0] }}
                </div>

                <a href="/logout" class="btn-logout">
                    Sair
                </a>

            </div>

        </header>

        <section class="content-area">

            {% block content %}{% endblock %}

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
