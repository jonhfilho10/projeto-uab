{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <div class="login-header text-center mb-4">

            <div class="logo-circle mb-3">
                ⚽
            </div>

            <h2 class="fw-bold mb-1">
                Projeto Social Esportivo
            </h2>

            <p class="text-muted mb-0">
                Sistema de Gestão de Participantes
            </p>

        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control form-control-lg">
            </div>

            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control form-control-lg">
            </div>

            <button type="submit" id="btnEntrar" class="btn btn-primary btn-lg w-100">
                Entrar
            </button>

        </form>

    </div>

</div>

<div class="modal fade" id="modalErro" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body text-center p-4">

                <div class="mb-3">
                    <div class="erro-icone mx-auto">
                        ×
                    </div>
                </div>

                <h6 class="fw-bold mb-2" id="modalTitulo">
                    Acesso Negado
                </h6>

                <p class="text-muted mb-3" id="modalMensagem">
                    E-mail ou senha inválidos.
                </p>

                <button type="button"
                        class="btn btn-primary btn-sm px-4"
                        data-bs-dismiss="modal">
                    Tentar novamente
                </button>

            </div>
        </div>
    </div>
</div>

<style>
.login-page {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d47a1, #1976d2, #42a5f5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.login-card {
    width: 100%;
    max-width: 460px;
    background: rgba(255, 255, 255, 0.96);
    border-radius: 22px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.25);
    padding: 42px;
}

.logo-circle {
    width: 82px;
    height: 82px;
    background: #0d47a1;
    color: #fff;
    border-radius: 50%;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 25px rgba(13,71,161,0.35);
}

.form-control {
    border-radius: 12px;
}

.btn {
    border-radius: 12px;
}

.erro-icone {
    width: 55px;
    height: 55px;
    border: 2px solid #ff6b6b;
    border-radius: 50%;
    color: #ff6b6b;
    font-size: 36px;
    line-height: 50px;
    font-weight: 300;
}
</style>

{% endblock %}

{% block scripts %}

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const btn = document.getElementById("btnEntrar");

    btn.disabled = true;
    btn.innerHTML = `
        <span class="spinner-border spinner-border-sm me-2"></span>
        Validando...
    `;

    fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            senha: senha
        })
    })
    .then(async response => {
        const data = await response.json();

        if (!response.ok) {
            throw data;
        }

        return data;
    })
    .then(data => {
        window.location.href = data.redirect;
    })
    .catch(error => {
        document.getElementById("modalTitulo").innerText =
            error.titulo || "Acesso Negado";

        document.getElementById("modalMensagem").innerText =
            error.mensagem || "Não foi possível realizar o login.";

        const modal = new bootstrap.Modal(document.getElementById("modalErro"));
        modal.show();

        btn.disabled = false;
        btn.innerHTML = "Entrar";
    });
});
</script>

{% endblock %}
