{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow" style="width: 420px;">
        <div class="card-body p-4">

            <h3 class="text-center mb-4">Login</h3>

            <form id="loginForm">

                <div class="mb-3">
                    <label>E-mail</label>
                    <input type="email" id="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Senha</label>
                    <input type="password" id="senha" class="form-control">
                </div>

                <button type="submit" id="btnEntrar" class="btn btn-primary w-100">
                    Entrar
                </button>

            </form>

        </div>
    </div>

</div>

<div class="modal fade" id="modalErro" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">

            <div class="modal-body text-center p-4">

                <div class="mb-4">
                    <div class="erro-icone mx-auto">
                        ×
                    </div>
                </div>

                <h5 class="fw-bold mb-3" id="modalTitulo">Acesso Negado</h5>

                <p class="text-muted mb-4" id="modalMensagem">
                    E-mail e senha são obrigatórios.
                </p>

                <button type="button" class="btn btn-primary px-4" data-bs-dismiss="modal">
                    Tentar novamente
                </button>

            </div>

        </div>
    </div>
</div>

<style>
.erro-icone {
    width: 55px;
    height: 55px;
    border: 2px solid #ff6b6b;
    border-radius: 50%;
    color: #ff6b6b;
    font-size: 36px;
    line-height: 48px;
    font-weight: 300;
}
</style>

{% endblock %}

{% block scripts %}
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const btn = document.getElementById("btnEntrar");

    btn.disabled = true;
    btn.innerHTML = `
        <span class="spinner-border spinner-border-sm me-2"></span>
        Validando...
    `;

    fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            senha: senha
        })
    })
    .then(async response => {
        const data = await response.json();

        if (!response.ok) {
            throw data;
        }

        return data;
    })
    .then(data => {
        window.location.href = data.redirect;
    })
    .catch(error => {
        document.getElementById("modalTitulo").innerText = error.titulo || "Erro";
        document.getElementById("modalMensagem").innerText = error.mensagem || "Não foi possível realizar o login.";

        const modal = new bootstrap.Modal(document.getElementById("modalErro"));
        modal.show();

        btn.disabled = false;
        btn.innerHTML = "Entrar";
    });
});
</script>
{% endblock %}
